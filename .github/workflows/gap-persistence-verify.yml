name: collective-gap-persistence-verify

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  verify-recorded:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'gap/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Parse persistence metadata and verify main
        id: verify
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          printf '%s' "$PR_BODY" > /tmp/pr-body.txt
          python3 - << 'PY' > /tmp/meta.json
          import json, os, re
          text = open('/tmp/pr-body.txt', encoding='utf-8').read()
          def field(name):
              m = re.search(rf'(?m)^\s*{re.escape(name)}:\s*(.+?)\s*$', text)
              if not m:
                  raise SystemExit(f'missing persistence field: {name}')
              return m.group(1).strip()
          issue = field('issue')
          filename = field('filename')
          fingerprint = field('fingerprint')
          if not re.fullmatch(r'[0-9]+', issue):
              raise SystemExit('invalid issue number')
          if not re.fullmatch(r'[a-z0-9][a-z0-9-]*\.md', filename):
              raise SystemExit('invalid filename')
          if not re.fullmatch(r'[0-9a-f]{64}', fingerprint):
              raise SystemExit('invalid fingerprint')
          print(json.dumps({'issue': issue, 'filename': filename, 'fingerprint': fingerprint}))
          PY

          issue=$(python3 -c "import json;print(json.load(open('/tmp/meta.json'))['issue'])")
          filename=$(python3 -c "import json;print(json.load(open('/tmp/meta.json'))['filename'])")
          fingerprint=$(python3 -c "import json;print(json.load(open('/tmp/meta.json'))['fingerprint'])")
          path="gaps/$filename"
          test -f "$path" || { echo "expected file missing on main: $path"; exit 1; }
          marker="<!-- collective-gap-source issue=$issue fingerprint=$fingerprint -->"
          grep -Fqx "$marker" "$path" || { echo "expected source marker missing on main"; exit 1; }

          echo "issue=$issue" >> "$GITHUB_OUTPUT"
          echo "filename=$filename" >> "$GITHUB_OUTPUT"
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Mark source issue recorded and close
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ steps.verify.outputs.issue }}
          FILENAME: ${{ steps.verify.outputs.filename }}
          FINGERPRINT: ${{ steps.verify.outputs.fingerprint }}
        run: |
          gh issue comment "$ISSUE" --body "<!-- collective-gap-persistence
          state: recorded
          issue: $ISSUE
          pr: ${{ github.event.pull_request.number }}
          filename: $FILENAME
          fingerprint: $FINGERPRINT
          -->
          Verified on main: the expected gap file contains this session's source fingerprint. This training session is now recorded in Collective."
          gh issue close "$ISSUE" --reason completed
