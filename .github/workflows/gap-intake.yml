# Lighter-gated gap-write path — sibling to intake.yml, NOT a replacement for it.
# Entry intake (intake.yml) lands canon via a human-merged PR. Gap writes also wait
# for human merge. Persistence is tracked on the source issue: submitted -> pending
# review -> recorded. The issue stays open until a separate post-merge workflow
# verifies the expected fingerprint in the expected file on main.
name: collective-gap-intake

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write
  pull-requests: write

concurrency:
  group: gap-intake
  cancel-in-progress: false

jobs:
  validate-and-commit:
    if: contains(github.event.issue.labels.*.name, 'intake:gap')
    runs-on: ubuntu-latest
    steps:
      - name: Mint a short-lived bot token from the GitHub App
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.COLLECTIVE_BOT_APP_ID }}
          private-key: ${{ secrets.COLLECTIVE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: Collective

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Record submitted state
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body '<!-- collective-gap-persistence
          state: submitted
          issue: ${{ github.event.issue.number }}
          -->
          Submission received. It is not recorded in Collective yet.'

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          printf '%s' "$ISSUE_BODY" > /tmp/body.txt

      - name: Fetch account age
        id: account
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          created_at=$(gh api "users/${{ github.event.issue.user.login }}" --jq .created_at)
          echo "created_at=$created_at" >> "$GITHUB_OUTPUT"

      - name: Load rate-limit state and existing gaps
        run: |
          mkdir -p /tmp/state
          cp gaps/_state/ratelimit.json /tmp/state/ratelimit.json 2>/dev/null || echo '{}' > /tmp/state/ratelimit.json
          python3 - << 'PY' > /tmp/existing_gaps.json
          import glob, json, os, re
          slug = re.compile(r"^[a-z0-9][a-z0-9-]*\.md$")
          type_re = re.compile(r"^-\s*\*\*Type:\*\*\s*(.+)$")
          out = {}
          for p in glob.glob("gaps/*.md"):
              n = os.path.basename(p)
              if not slug.match(n):
                  continue
              gtype = ""
              with open(p, encoding="utf-8") as fh:
                  for line in fh:
                      m = type_re.match(line.strip())
                      if m:
                          gtype = m.group(1).strip().lower()
                          break
              out[n] = gtype
          print(json.dumps(out))
          PY

      - name: Run the gap steward
        id: validate
        run: |
          python3 cli_gap.py \
            --body-file /tmp/body.txt \
            --login "${{ github.event.issue.user.login }}" \
            --created-at "${{ steps.account.outputs.created_at }}" \
            --existing-gaps-file /tmp/existing_gaps.json \
            --ratelimit-file /tmp/state/ratelimit.json \
            --form-file ".github/ISSUE_TEMPLATE/gap-log.yml" \
            > /tmp/result.json
          cat /tmp/result.json
          echo "status=$(python3 -c "import json;print(json.load(open('/tmp/result.json'))['status'])")" >> "$GITHUB_OUTPUT"

      - name: Moderation hold
        if: steps.validate.outputs.status == 'moderation_hold'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" --add-label "flagged:moderation"
          gh issue comment "${{ github.event.issue.number }}" --body '<!-- collective-gap-persistence
          state: moderation-hold
          issue: ${{ github.event.issue.number }}
          -->
          This submission is awaiting human moderation. It is not recorded in Collective.'

      - name: Reject and close
        if: steps.validate.outputs.status == 'reject'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          reasons=$(python3 -c "import json;print('\n'.join('- ' + r for r in json.load(open('/tmp/result.json'))['reasons']))")
          gh issue comment "${{ github.event.issue.number }}" --body "<!-- collective-gap-persistence
          state: rejected
          issue: ${{ github.event.issue.number }}
          -->
          Automated gap check failed:
          $reasons

          Nothing was recorded in Collective. Fix the issue and open a new submission."
          gh issue close "${{ github.event.issue.number }}" --reason "not planned"

      - name: Accept, fingerprint, and open review PR
        if: steps.validate.outputs.status == 'accept'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          filename=$(python3 -c "import json;print(json.load(open('/tmp/result.json'))['filename'])")
          echo "$filename" | grep -Eq '^[a-z0-9][a-z0-9-]*\.md$' || { echo "unsafe filename '$filename'"; exit 1; }

          fingerprint=$(python3 - << 'PY'
          import hashlib, json
          r = json.load(open('/tmp/result.json'))
          print(hashlib.sha256(r['record_text'].encode('utf-8')).hexdigest())
          PY
          )

          branch="gap/${{ github.event.issue.number }}-$(date +%s)"
          git checkout -b "$branch"

          ISSUE_NUMBER="${{ github.event.issue.number }}" FINGERPRINT="$fingerprint" python3 - << 'PY'
          import json, os, re
          r = json.load(open('/tmp/result.json'))
          fn = r['filename']
          path = os.path.join('gaps', fn)
          assert os.path.dirname(os.path.abspath(path)) == os.path.abspath('gaps'), "escaped gaps/"
          marker = f"<!-- collective-gap-source issue={os.environ['ISSUE_NUMBER']} fingerprint={os.environ['FINGERPRINT']} -->\n"
          if r['operation'] == 'create':
              assert not os.path.exists(path), "create target already exists"
              text = r['record_text']
              if not text.endswith('\n'):
                  text += '\n'
              open(path, 'w', encoding='utf-8').write(text + marker)
          else:
              assert os.path.exists(path), "append target missing"
              text = open(path, encoding='utf-8').read()
              text = re.sub(r'(?m)^- \*\*Status:\*\* .*$',
                            f"- **Status:** {r['new_status']}", text, count=1)
              if not text.endswith('\n'):
                  text += '\n'
              block = r['record_text']
              if not block.endswith('\n'):
                  block += '\n'
              text += '\n' + block + marker
              open(path, 'w', encoding='utf-8').write(text)
          PY

          cp /tmp/state/ratelimit.json gaps/_state/ratelimit.json
          git add "gaps/$filename" gaps/_state/ratelimit.json
          git -c user.name="collective-gap-bot" -c user.email="collective-gap-bot@users.noreply.github.com" \
            commit -m "gap($filename): #${{ github.event.issue.number }} from @${{ github.event.issue.user.login }}"
          git push origin "$branch"

          pr_body="$(cat <<EOF
          Mechanically validated gap write from #${{ github.event.issue.number }}. A human must merge it.

          <!-- collective-gap-persistence
          issue: ${{ github.event.issue.number }}
          filename: $filename
          fingerprint: $fingerprint
          state: pending-review
          -->
          EOF
          )"
          pr_url=$(gh pr create --title "gap: ${filename}" --body "$pr_body" --label "gap:auto")
          pr_number="${pr_url##*/}"

          gh issue comment "${{ github.event.issue.number }}" --body "<!-- collective-gap-persistence
          state: pending-review
          issue: ${{ github.event.issue.number }}
          pr: $pr_number
          filename: $filename
          fingerprint: $fingerprint
          -->
          Passed automated checks and opened PR #$pr_number. The issue remains open because the session is not recorded in Collective until that PR is merged and the file fingerprint is verified on main."

          # Deliberately do not close the issue here. The post-merge verifier is
          # the only workflow allowed to close it as completed.
